openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Legal Document Analyzer & Court Simulator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cases
    description: Case management
  - name: documents
    description: Document upload and management
  - name: findings
    description: AI analysis findings
  - name: categories
    description: Custom issue categories
  - name: court
    description: Court simulation
  - name: motions
    description: Generated motions
  - name: export
    description: Export and print

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CASES ───────────────────────────────────────────────────────────────────
  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List all cases
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseBody"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
        "404":
          description: Not found
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseBody"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cases/recent:
    get:
      operationId: getRecentCase
      tags: [cases]
      summary: Get most recently updated case
      responses:
        "200":
          description: Most recent case or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseOrNull"

  /cases/{id}/strategy:
    post:
      operationId: generateCaseStrategy
      tags: [cases]
      summary: Generate cumulative error brief and strategic roadmap for a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStrategy"
        "400":
          description: No findings found
        "404":
          description: Not found
    get:
      operationId: getCaseStrategy
      tags: [cases]
      summary: Get existing case strategy (cumulative error brief and roadmap)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Existing strategy or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseStrategyOrNull"
        "404":
          description: Not found

  # ─── DOCUMENTS ───────────────────────────────────────────────────────────────
  /cases/{caseId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Add a document (paste text) to a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /cases/{caseId}/documents/upload:
    post:
      operationId: uploadDocuments
      tags: [documents]
      summary: Upload one or more files (PDF, DOCX, image, TXT) to a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required: [files]
      responses:
        "201":
          description: Documents created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /cases/{caseId}/documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cases/{caseId}/documents/{id}/analyze:
    post:
      operationId: analyzeDocument
      tags: [documents]
      summary: Run exhaustive AI analysis on a document (SSE stream)
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of analysis progress and findings

  # ─── FINDINGS ────────────────────────────────────────────────────────────────
  /cases/{caseId}/documents/{documentId}/findings:
    get:
      operationId: listFindings
      tags: [findings]
      summary: List findings for a document
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Finding"

  /cases/{caseId}/documents/{documentId}/findings/{id}:
    get:
      operationId: getFinding
      tags: [findings]
      summary: Get a single finding
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
        "404":
          description: Not found
    patch:
      operationId: updateFinding
      tags: [findings]
      summary: Update a finding (reassign category, edit notes)
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFindingBody"
      responses:
        "200":
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finding"
    delete:
      operationId: deleteFinding
      tags: [findings]
      summary: Delete a finding
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CATEGORIES ──────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all custom issue categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a custom issue category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── COURT SESSIONS ──────────────────────────────────────────────────────────
  /cases/{caseId}/court-sessions:
    get:
      operationId: listCourtSessions
      tags: [court]
      summary: List court simulation sessions for a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourtSession"
    post:
      operationId: createCourtSession
      tags: [court]
      summary: Create a new court simulation session
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourtSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourtSession"

  /cases/{caseId}/court-sessions/{id}:
    get:
      operationId: getCourtSession
      tags: [court]
      summary: Get a court session with all rounds
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Court session with rounds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourtSessionWithRounds"
        "404":
          description: Not found

  /cases/{caseId}/court-sessions/{id}/run:
    post:
      operationId: runCourtSimulation
      tags: [court]
      summary: Run the full simulation (SSE stream — 4+ rounds then verdict)
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of simulation rounds and verdict

  # ─── MOTIONS ─────────────────────────────────────────────────────────────────
  /cases/{caseId}/motions:
    get:
      operationId: listMotions
      tags: [motions]
      summary: List generated motions for a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of motions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Motion"

  /cases/{caseId}/motions/{id}:
    get:
      operationId: getMotion
      tags: [motions]
      summary: Get a motion document
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Motion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Motion"
        "404":
          description: Not found

  # ─── EXPORT ──────────────────────────────────────────────────────────────────
  /cases/{caseId}/export:
    get:
      operationId: exportCase
      tags: [export]
      summary: Export all findings and sessions as a structured JSON package
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full case export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseExport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── CASES ─────────────────────────────────────────────────────────────────
    Case:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        defendantName:
          type: ["string", "null"]
        caseNumber:
          type: ["string", "null"]
        jurisdiction:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        hasAnalysis:
          type: boolean
        hasMotion:
          type: boolean
        documentCount:
          type: ["integer", "null"]
        findingCount:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - hasAnalysis
        - hasMotion
        - createdAt
        - updatedAt

    CreateCaseBody:
      type: object
      properties:
        title:
          type: string
        defendantName:
          type: ["string", "null"]
        caseNumber:
          type: ["string", "null"]
        jurisdiction:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - title

    UpdateCaseBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        defendantName:
          type: ["string", "null"]
        caseNumber:
          type: ["string", "null"]
        jurisdiction:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    CaseOrNull:
      type: object
      properties:
        case:
          oneOf:
            - $ref: "#/components/schemas/Case"
            - type: "null"
      required:
        - case

    # ─── CASE STRATEGY ─────────────────────────────────────────────────────────
    CaseStrategy:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: integer
        cumulativeErrorBrief:
          type: string
        strategicRoadmap:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - caseId
        - cumulativeErrorBrief
        - strategicRoadmap
        - createdAt
        - updatedAt

    CaseStrategyOrNull:
      type: object
      properties:
        strategy:
          oneOf:
            - $ref: "#/components/schemas/CaseStrategy"
            - type: "null"
      required:
        - strategy

    # ─── DOCUMENTS ─────────────────────────────────────────────────────────────
    Document:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: integer
        title:
          type: string
        documentType:
          type: string
          enum: [transcript, police_report, appeal, motion, order, affidavit, exhibit, policy, executive_order, other]
        content:
          type: string
        status:
          type: string
          enum: [pending, analyzing, analyzed, error]
        findingCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - caseId
        - title
        - documentType
        - content
        - status
        - findingCount
        - createdAt
        - updatedAt

    CreateDocumentBody:
      type: object
      properties:
        title:
          type: string
        documentType:
          type: string
          enum: [transcript, police_report, appeal, motion, order, affidavit, exhibit, policy, executive_order, other]
        content:
          type: string
      required:
        - title
        - documentType
        - content

    # ─── FINDINGS ──────────────────────────────────────────────────────────────
    Finding:
      type: object
      properties:
        id:
          type: integer
        documentId:
          type: integer
        caseId:
          type: integer
        issueTitle:
          type: string
        transcriptExcerpt:
          type: string
        legalAnalysis:
          type: string
        precedentName:
          type: ["string", "null"]
        precedentCitation:
          type: ["string", "null"]
        precedentType:
          type: ["string", "null"]
          enum: [BINDING, PERSUASIVE, null]
        courtRuling:
          type: ["string", "null"]
        materialSimilarity:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        pageNumber:
          type: ["integer", "null"]
        lineNumber:
          type: ["integer", "null"]
        userNotes:
          type: ["string", "null"]
        proceduralStatus:
          type: ["string", "null"]
        anticipatedBlock:
          type: ["string", "null"]
        breakthroughArgument:
          type: ["string", "null"]
        legalVehicle:
          type: ["string", "null"]
        survivability:
          type: ["string", "null"]
        crossCaseMatches:
          type: array
          items:
            $ref: "#/components/schemas/CrossCaseMatch"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - documentId
        - caseId
        - issueTitle
        - transcriptExcerpt
        - legalAnalysis
        - crossCaseMatches
        - createdAt

    CrossCaseMatch:
      type: object
      properties:
        sourceDocumentId:
          type: integer
        sourceDocumentTitle:
          type: string
        matchedPassage:
          type: string
        explanation:
          type: string
        relevanceScore:
          type: number
      required:
        - sourceDocumentId
        - sourceDocumentTitle
        - matchedPassage
        - explanation
        - relevanceScore

    RedactTextBody:
      type: object
      properties:
        text:
          type: string
      required: [text]

    RedactTextResponse:
      type: object
      properties:
        redacted:
          type: string
        changesCount:
          type: integer
      required: [redacted, changesCount]

    UpdateFindingBody:
      type: object
      properties:
        categoryId:
          type: ["integer", "null"]
        userNotes:
          type: ["string", "null"]
        issueTitle:
          type: ["string", "null"]

    # ─── CATEGORIES ────────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        badgeLabel:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string
          enum: [blue, yellow, red, pink, orange]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - badgeLabel
        - color
        - createdAt

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        badgeLabel:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string
          enum: [blue, yellow, red, pink, orange]
      required:
        - name
        - badgeLabel
        - color

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        badgeLabel:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]

    # ─── COURT SESSIONS ────────────────────────────────────────────────────────
    CourtSession:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: integer
        simulationMode:
          type: string
          enum: [direct_appeal, bangert_motion, postconviction_974, federal_habeas]
        skepticMode:
          type: boolean
        expandedRecord:
          type: boolean
        pleaQuestionnaireNotes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, completed, error]
        verdictRating:
          type: ["string", "null"]
        verdictSummary:
          type: ["string", "null"]
        defenseWon:
          type: ["boolean", "null"]
        totalRounds:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - caseId
        - simulationMode
        - skepticMode
        - expandedRecord
        - status
        - createdAt
        - updatedAt

    CreateCourtSessionBody:
      type: object
      properties:
        simulationMode:
          type: string
          enum: [direct_appeal, bangert_motion, postconviction_974, federal_habeas]
        skepticMode:
          type: boolean
        expandedRecord:
          type: boolean
        pleaQuestionnaireNotes:
          type: ["string", "null"]
        documentIds:
          type: array
          items:
            type: integer
      required:
        - simulationMode
        - documentIds

    CourtRound:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        roundNumber:
          type: integer
        stateStrength:
          type: string
          enum: [MINIMAL, MODERATE, STRONG, OVERWHELMING]
        defenseBurden:
          type: string
        stateArgument:
          type: string
        courtCommentary:
          type: string
        defenseResponse:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - roundNumber
        - stateStrength
        - defenseBurden
        - stateArgument
        - courtCommentary
        - defenseResponse
        - createdAt

    CourtSessionWithRounds:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/CourtSession"
        rounds:
          type: array
          items:
            $ref: "#/components/schemas/CourtRound"
      required:
        - session
        - rounds

    # ─── MOTIONS ───────────────────────────────────────────────────────────────
    Motion:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: integer
        sessionId:
          type: ["integer", "null"]
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - caseId
        - title
        - content
        - createdAt

    # ─── EXPORT ────────────────────────────────────────────────────────────────
    CaseExport:
      type: object
      properties:
        case:
          $ref: "#/components/schemas/Case"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        courtSessions:
          type: array
          items:
            $ref: "#/components/schemas/CourtSessionWithRounds"
        motions:
